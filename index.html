<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hifty Co. Blockchain Visualizer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>₿</text></svg>">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a25;
      --bg-hover: #222230;
      --primary: #f7931a;
      --primary-glow: rgba(247,147,26,0.4);
      --text: #ffffff;
      --text-secondary: #a0a0b0;
      --text-muted: #606070;
      --border: #2a2a3a;
      --success: #00d4aa;
      --accent: #6366f1;
    }
    
    body {
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    
    #root { min-height: 100vh; }
    
    /* Nav */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(10,10,15,0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      z-index: 100;
    }
    
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.4rem;
      font-weight: 700;
    }
    
    .nav-logo .btc { color: var(--primary); font-size: 1.6rem; }
    .nav-logo .name { color: var(--text); }
    
    .nav-links { display: flex; gap: 32px; }
    .nav-links a {
      color: var(--text-secondary);
      font-weight: 500;
      text-decoration: none;
      transition: color 0.2s;
      font-size: 0.95rem;
    }
    .nav-links a:hover { color: var(--primary); }
    
    /* Hero */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px 80px;
      background: 
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(247,147,26,0.15) 0%, transparent 60%),
        radial-gradient(circle at 80% 80%, rgba(99,102,241,0.1) 0%, transparent 40%);
    }
    
    .hero h1 {
      font-size: clamp(2.8rem, 7vw, 4.5rem);
      font-weight: 700;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    
    .hero h1 .highlight {
      background: linear-gradient(135deg, var(--primary) 0%, #ffb347 50%, var(--success) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .hero p {
      font-size: 1.2rem;
      color: var(--text-secondary);
      max-width: 640px;
      margin-bottom: 40px;
      line-height: 1.7;
    }
    
    .hero-btns { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    
    .btn {
      padding: 16px 32px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      border: none;
      font-family: inherit;
    }
    
    .btn-primary {
      background: var(--primary);
      color: #000;
      box-shadow: 0 0 30px var(--primary-glow);
    }
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 40px var(--primary-glow);
    }
    
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
    
    /* Stats */
    .stats-section { padding: 60px 24px; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: 0 auto;
    }
    
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      text-align: center;
      transition: all 0.3s;
    }
    .stat-card:hover {
      transform: translateY(-4px);
      border-color: var(--primary);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    
    .stat-value {
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .stat-label { color: var(--text-secondary); font-size: 0.9rem; }
    
    /* Blockchain Viz */
    .blockchain-section {
      padding: 80px 24px;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .section-header {
      text-align: center;
      margin-bottom: 48px;
    }
    
    .section-header h2 {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .section-header h2 span { color: var(--primary); }
    .section-header p { color: var(--text-secondary); font-size: 1.1rem; }
    
    .viz-container {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px;
      margin-bottom: 32px;
    }
    
    .blockchain-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .block {
      width: 90px;
      height: 90px;
      background: linear-gradient(145deg, var(--bg-card), var(--bg-hover));
      border: 2px solid var(--border);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    
    .block::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--success));
    }
    
    .block:hover {
      transform: scale(1.08) translateY(-4px);
      border-color: var(--primary);
      box-shadow: 0 20px 40px rgba(247,147,26,0.2);
    }
    
    .block-num { font-size: 1.1rem; color: var(--primary); }
    .block-hash { font-size: 0.6rem; color: var(--text-muted); font-family: monospace; }
    
    .block.new {
      background: linear-gradient(145deg, var(--primary), #ffb347);
      border-color: var(--primary);
      animation: blockAppear 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .block.new .block-num, .block.new .block-hash { color: #000; }
    
    @keyframes blockAppear {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    
    .arrow { color: var(--primary); font-size: 1.8rem; }
    
    .viz-controls {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    /* Topics */
    .topics-section { padding: 80px 24px; max-width: 1200px; margin: 0 auto; }
    
    .topics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
    }
    
    .topic-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      transition: all 0.3s;
      cursor: pointer;
    }
    .topic-card:hover {
      transform: translateY(-4px);
      border-color: var(--primary);
      background: var(--bg-hover);
    }
    
    .topic-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(247,147,26,0.2), rgba(0,212,170,0.2));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin-bottom: 20px;
    }
    
    .topic-card h3 {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .topic-card p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.7;
    }
    
    /* Features */
    .features-section { padding: 80px 24px; max-width: 1200px; margin: 0 auto; }
    
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }
    
    .feature-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      transition: all 0.3s;
    }
    .feature-card:hover {
      border-color: var(--success);
      transform: translateY(-4px);
    }
    
    .feature-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, var(--success), #00a88a);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: #000;
    }
    
    .feature-card h3 { font-size: 1.2rem; font-weight: 600; margin-bottom: 10px; }
    .feature-card p { color: var(--text-secondary); font-size: 0.9rem; }
    
    /* Footer */
    .footer {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 48px 24px;
      text-align: center;
    }
    .footer p { color: var(--text-muted); }
    
    /* Responsive */
    @media (max-width: 768px) {
      .nav { padding: 0 20px; }
      .nav-links { display: none; }
      .hero h1 { font-size: 2.2rem; }
      .block { width: 70px; height: 70px; }
      .viz-container { padding: 24px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;
    
    // Icons
    const BtcIcon = () => <span style={{fontSize:'1.4rem'}}>₿</span>;
    const ArrowIcon = () => <span style={{color:'var(--primary)',fontSize:'1.6rem'}}>→</span>;
    const PlusIcon = () => <span>+</span>;
    
    // Navigation
    const Navbar = () => (
      <nav className="nav">
        <div className="nav-logo">
          <span className="btc"><BtcIcon/></span>
          <span className="name">HiftyCo</span>
        </div>
        <div className="nav-links">
          <a href="#learn">Learn</a>
          <a href="#blockchain">Blockchain</a>
          <a href="#resources">Resources</a>
        </div>
      </nav>
    );
    
    // Hero Section
    const Hero = () => (
      <section className="hero">
        <h1>
          Master <span className="highlight">Blockchain</span><br/>
          Technology
        </h1>
        <p>
          Interactive learning platform to understand Bitcoin, blockchain, and 
          decentralized finance. Start your journey to financial freedom.
        </p>
        <div className="hero-btns">
          <button className="btn btn-primary">Start Learning</button>
          <button className="btn btn-outline">Explore</button>
        </div>
      </section>
    );
    
    // Stats
    const Stats = () => {
      const stats = [
        {v:'21M',l:'Bitcoin Supply'},
        {v:'10min',l:'Block Time'},
        {v:'200M+',l:'Global Users'},
        {v:'$1.4T',l:'Market Cap'}
      ];
      
      return (
        <section className="stats-section">
          <div className="stats-grid">
            {stats.map((s,i) => (
              <div key={i} className="stat-card">
                <div className="stat-value">{s.v}</div>
                <div className="stat-label">{s.l}</div>
              </div>
            ))}
          </div>
        </section>
      );
    };
    
    // Blockchain Visualizer
    const BlockchainViz = () => {
      const [blocks, setBlocks] = useState([
        {id:1,hash:'0000a3...'},
        {id:2,hash:'0000b7...'},
        {id:3,hash:'0000c2...'},
        {id:4,hash:'0000d1...'},
        {id:5,hash:'0000e8...'}
      ]);
      const [newId, setNewId] = useState(null);
      
      const addBlock = () => {
        const next = blocks.length + 1;
        const hash = '0000' + Math.random().toString(16).substr(2,4) + '...';
        setNewId(next);
        setTimeout(() => {
          setBlocks([...blocks,{id:next,hash}]);
          setNewId(null);
        },600);
      };
      
      return (
        <section id="blockchain" className="blockchain-section">
          <div className="section-header">
            <h2>How <span>Blockchain</span> Works</h2>
            <p>Each block contains verified transactions, linked cryptographically</p>
          </div>
          
          <div className="viz-container">
            <div className="blockchain-row">
              {blocks.map((b,i) => (
                <div key={b.id} style={{display:'flex',alignItems:'center'}}>
                  <div className={`block ${newId===b.id?'new':''}`}>
                    <span className="block-num">#{b.id}</span>
                    <span className="block-hash">{b.hash}</span>
                  </div>
                  {i < blocks.length -1 && <ArrowIcon/>}
                </div>
              ))}
            </div>
          </div>
          
          <div className="viz-controls">
            <button onClick={addBlock} className="btn btn-primary">
              <PlusIcon/> Add Block
            </button>
          </div>
        </section>
      );
    };
    
    // Learn Topics
    const LearnTopics = () => {
      const topics = [
        {i:'₿',t:'What is Bitcoin?',d:'Digital currency created in 2009 by Satoshi Nakamoto. Decentralized, limited supply, secure.'},
        {i:'⛓️',t:'How Blockchain Works',d:'Distributed ledger technology. Transactions recorded across thousands of computers.'},
        {i:'⛏️',t:'Mining & Consensus',d:'Proof of Work secures the network. Miners validate transactions and earn rewards.'},
        {i:'🔐',t:'Wallets & Keys',d:'Public keys for receiving, private keys for spending. Self-custody is key.'},
        {i:'📊',t:'Trading Basics',d:'Technical analysis, indicators, risk management. Trade with edge.'},
        {i:'🌐',t:'DeFi & Web3',d:'Decentralized finance protocols. Yield, lending, trading without intermediaries.'}
      ];
      
      return (
        <section id="learn" className="topics-section">
          <div className="section-header">
            <h2>Start <span>Learning</span></h2>
            <p>Comprehensive guides to master cryptocurrency</p>
          </div>
          
          <div className="topics-grid">
            {topics.map((t,i) => (
              <div key={i} className="topic-card">
                <div className="topic-icon">{t.i}</div>
                <h3>{t.t}</h3>
                <p>{t.d}</p>
              </div>
            ))}
          </div>
        </section>
      );
    };
    
    // Features
    const Features = () => {
      const features = [
        {i:'📚',t:'Expert Education',d:'Learn from experienced traders and developers.'},
        {i:'📈',t:'Real-Time Data',d:'Live market data and professional tools.'},
        {i:'🛡️',t:'Risk Management',d:'Capital preservation and smart strategies.'},
        {i:'🎯',t:'1% Mindset',d:'Join the top traders who consistently profit.'},
        {i:'💡',t:'Latest Research',d:'Cutting-edge strategies and analysis.'},
        {i:'🤝',t:'Community',d:'Network with like-minded learners.'}
      ];
      
      return (
        <section id="resources" className="features-section">
          <div className="section-header">
            <h2>Why <span>HiftyCo</span></h2>
            <p>Everything you need to succeed</p>
          </div>
          
          <div className="features-grid">
            {features.map((f,i) => (
              <div key={i} className="feature-card">
                <div className="feature-icon">{f.i}</div>
                <h3>{f.t}</h3>
                <p>{f.d}</p>
              </div>
            ))}
          </div>
        </section>
      );
    };
    
    // Footer
    const Footer = () => (
      <footer className="footer">
        <p>© 2026 HiftyCo. Built for the 1%.</p>
      </footer>
    );
    
    // Main App
    const App = () => (
      <>
        <Navbar/>
        <Hero/>
        <Stats/>
        <BlockchainViz/>
        <LearnTopics/>
        <Features/>
        <Footer/>
      </>
    );
    
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
